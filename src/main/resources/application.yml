server:
  port: 9231


app:
  udp:
    port: 9234
    buffer-size: 65507
    thread-pool-size: 20
  device-map:
    personnel-device-id: PERSON001
    vehicle-device-id: CAR001
  geodetic:
    base-url: https://www.geodetic.gov.hk/transform/v2/


spring:
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:mysql://localhost:3306/rtk_monitor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true